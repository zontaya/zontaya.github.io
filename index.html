<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="A front-end template that helps you build fast, modern mobile web apps.">
  <meta name="viewport" content="width=device-width">
  <meta name="theme-color" content="#2F3BA2">
  <title>Material Design Lite</title>

  <!-- Add to homescreen for Chrome on Android -->
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="icon" sizes="192x192" href="images/android-desktop.png">


  <!-- Add to homescreen for Safari on iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Material Design Lite">
  <link rel="apple-touch-icon-precomposed" href="images/ios-desktop.png">

  <!-- Tile icon for Win8 (144x144 + tile color) -->
  <meta name="msapplication-TileImage" content="images/icons/icon-144x144.png">
  <meta name="msapplication-TileColor" content="#2F3BA2">

  <link rel="apple-touch-icon" href="images/icons/icon-152x152.png">
  <link rel="shortcut icon" href="images/icons/icon-192x192.png">

  <link rel="manifest" href="/manifest.json">

  <link rel="stylesheet" href="script/material.min.css">
  <script defer src="script/material.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

</head>

<body class="mdc-typography">

  <header class="mdc-toolbar mdc-toolbar--fixed mdc-toolbar--waterfall">
    <div class="mdc-toolbar__row">
      <section class="mdc-toolbar__section mdc-toolbar__section--align-start">
        <span class="mdc-toolbar__title">Progressive Web App</span>
      </section>
    </div>
  </header>
  <main class="mdc-toolbar-fixed-adjust">
    <p class="demo-paragraph">

    </p>

    <div class="mdc-chip mdc-chip--selected">
      <i class="material-icons mdc-chip__icon mdc-chip__icon--leading mdc-chip__icon--leading-hidden">done</i>
      <div class="mdc-chip__text">service worker</div>
    </div>
    <p class="demo-paragraph">

    </p>

    <div class="mdc-chip mdc-chip--selected">
      <i class="material-icons mdc-chip__icon mdc-chip__icon--leading mdc-chip__icon--leading-hidden">clear</i>
      <div class="mdc-chip__text">notification</div>
    </div>


    <h1 class="mdc-typography--headline6"> </h1>
  </main>

  <!-- <script src="/script/main.js"></script> -->
  <script src="notification.js"></script>

</body>

</html>
